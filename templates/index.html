<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }
        h1 {
            background-color: #333;
            color: white;
            padding: 15px;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 15px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🛒 My E-Commerce Store</h1>

<div class="container">
    {% for product in products %}
    <div class="card">
        <h2>{{ product.name }}</h2>
        <p>{{ product.price }}</p>
        <button>Add to Cart</button>
    </div>
    {% endfor %}
</div>

</body>
</html>
